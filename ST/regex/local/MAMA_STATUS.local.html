<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MAMA Status Local</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      border-radius: 16px;
    }

    #app-frame {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      border: 0;
      display: block;
      background: transparent;
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <iframe
    id="app-frame"
    title="MAMA Status"
    src="http://127.0.0.1:4173/apps/visual-dashboard/index.html"
    sandbox="allow-scripts allow-forms allow-modals allow-popups allow-same-origin"
    allow="fullscreen"
    allowfullscreen
    referrerpolicy="no-referrer"
  ></iframe>

  <script>
    (function () {
      const frame = document.getElementById('app-frame');
      const hostFrame = window.frameElement;
      let lastContainerPayload = null;
      let lastStatePayload = null;

      function resizeAndStyleHostFrame() {
        if (!hostFrame) return;
        hostFrame.style.width = '100%';
        hostFrame.style.maxWidth = '500px';
        hostFrame.style.height = '920px';
        hostFrame.style.minHeight = '920px';
        hostFrame.style.border = '1px solid rgba(128, 128, 128, 0.2)';
        hostFrame.style.borderRadius = '16px';
        hostFrame.style.overflow = 'hidden';
        hostFrame.style.boxShadow = '0 6px 20px rgba(0, 0, 0, 0.15)';
        hostFrame.style.margin = '10px auto';
        hostFrame.style.display = 'block';
        hostFrame.style.background = 'transparent';
      }

      function appendCacheBust() {
        try {
          const base = frame.getAttribute('src') || '';
          if (base && !/\bv=\d+\b/.test(base)) {
            const sep = base.includes('?') ? '&' : '?';
            frame.src = base + sep + 'v=' + Date.now();
          }
        } catch (e) {}
      }

      function postToApp(payload) {
        if (!frame || !frame.contentWindow || !payload) return;
        frame.contentWindow.postMessage(payload, '*');
      }

      function replayBridgePayloads() {
        postToApp(lastContainerPayload);
        postToApp(lastStatePayload);
      }

      function requestStatus(reason) {
        try {
          window.parent.postMessage({
            type: 'MAMA_STATUS_REQUEST',
            appId: 'visual-dashboard',
            reason: reason || 'wrapperRequest'
          }, '*');
        } catch (e) {}
      }

      function handleMessage(event) {
        const payload = event && event.data;
        if (!payload || typeof payload !== 'object' || !payload.type) return;

        if (event.source === frame.contentWindow) {
          if (payload.type === 'MAMA_STATUS_READY' || payload.type === 'mama:app-ready') {
            try {
              window.parent.postMessage(payload, '*');
            } catch (e) {}
            requestStatus('appReady');
          }
          return;
        }

        if (payload.type === 'mama:container-ready') {
          lastContainerPayload = payload;
          postToApp(payload);
          return;
        }

        if (payload.type === 'MAMA_STATE_PUSH') {
          lastStatePayload = payload;
          postToApp(payload);
        }
      }

      resizeAndStyleHostFrame();
      window.addEventListener('resize', resizeAndStyleHostFrame);
      window.addEventListener('message', handleMessage);
      frame.addEventListener('load', function () {
        replayBridgePayloads();
        requestStatus('frameLoad');
      });
      appendCacheBust();
      setTimeout(function () {
        requestStatus('initial');
      }, 100);
    })();
  </script>
</body>
</html>
